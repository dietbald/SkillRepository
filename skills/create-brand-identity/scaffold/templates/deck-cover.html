<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Deck Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1B2A4A;
    --accent: #D03C3C;
    --off-white: #F5F5F0;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--primary); overflow: hidden; }

  .slide {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    color: var(--off-white);
    font-family: 'Playfair Display', Georgia, serif;
  }

  .wm {
    width: 480px;
    margin-bottom: 80px;
  }
  .wm img, .wm svg { width: 100%; height: auto; display: block; }

  .title {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.15;
    text-align: center;
    max-width: 1100px;
    margin: 0;
    color: var(--white);
    outline: none;
  }
  .title .accent { color: var(--accent); }

  .meta {
    margin-top: 64px;
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 16px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(245, 245, 240, 0.6);
    outline: none;
  }

  /* 16:9 fixed-ratio variant — fullscreen at 1920x1080 */
  @media (aspect-ratio: 16/9) {
    .slide { padding: 100px; }
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="wm">
      <!-- Outlined white wordmark — survives across screen captures, PDF export, presentation import -->
      <img src="../05-Assets/logos/autopilot-wordmark-white-outlined.svg" alt="Autopilot.">
    </div>
    <h1 class="title" contenteditable="true">Operating change that lands<span class="accent">.</span></h1>
    <div class="meta" contenteditable="true">[Client] &middot; [Date]</div>
  </div>
</body>
</html>
